name: keepalive
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
permissions:
  actions: write
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Keep scheduled workflows enabled
        run: |
          gh api -X PUT "repos/${{ github.repository }}/actions/workflows/cron.yml/enable"
          gh api -X PUT "repos/${{ github.repository }}/actions/workflows/keepalive.yml/enable"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
